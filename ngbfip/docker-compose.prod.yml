version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ng_bifp_db
    environment:
      POSTGRES_DB: ng_bifp
      POSTGRES_USER: bifp_user
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ng_bifp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bifp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ng_bifp_api
    environment:
      DATABASE_URL: postgresql://bifp_user:secure_password_change_me@postgres:5432/ng_bifp
      SECRET_KEY: your_secret_key_here
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - ng_bifp_network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ng_bifp_web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - ng_bifp_network

volumes:
  postgres_data:

networks:
  ng_bifp_network:
    driver: bridge
